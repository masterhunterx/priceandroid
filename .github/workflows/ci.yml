name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt bandit

      - name: Security scan (Bandit)
        working-directory: backend
        run: |
          bandit -r . -ll \
            --exclude ./.venv,./tests,./scripts,./migrate_to_postgres.py \
            -f txt

      - name: Run unit tests (no network required)
        working-directory: backend
        env:
          DATABASE_URL: sqlite:///./test_ci.db
          API_KEY: test-key-ci
          JWT_SECRET_KEY: test-jwt-secret-key-for-ci-only-32ch
          ENVIRONMENT: development
          DISCORD_WEBHOOK_URL: ""
          DISCORD_BOT_TOKEN: ""
          GROQ_API_KEY: ""
          HUGGINGFACE_TOKEN: ""
        run: |
          python -m pytest \
            tests/test_unit_critical.py \
            tests/test_matcher.py \
            tests/test_security_and_validation.py \
            -v --tb=short

      - name: Run integration & security tests
        working-directory: backend
        env:
          DATABASE_URL: sqlite:///./test_ci.db
          API_KEY: test-key-ci
          JWT_SECRET_KEY: test-jwt-secret-key-for-ci-only-32ch
          ENVIRONMENT: development
          DISCORD_WEBHOOK_URL: ""
          DISCORD_BOT_TOKEN: ""
          GROQ_API_KEY: ""
          HUGGINGFACE_TOKEN: ""
        run: |
          python -m pytest \
            tests/test_api_integration.py \
            tests/test_security_owasp.py \
            tests/test_error_handling.py \
            -v --tb=short

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/freshcart---smart-grocery-assistant/package-lock.json

      - name: Install dependencies
        working-directory: frontend/freshcart---smart-grocery-assistant
        run: npm ci

      - name: Run Vitest unit tests
        working-directory: frontend/freshcart---smart-grocery-assistant
        run: npm test

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    needs: frontend-tests

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/freshcart---smart-grocery-assistant/package-lock.json

      - name: Install dependencies
        working-directory: frontend/freshcart---smart-grocery-assistant
        run: npm ci

      - name: Build
        working-directory: frontend/freshcart---smart-grocery-assistant
        run: npm run build
