name: Líder Scraper

on:
  schedule:
    # 6:00 AM y 7:00 PM hora Santiago (UTC-3 → 09:00 y 22:00 UTC)
    - cron: '0 9 * * *'
    - cron: '0 22 * * *'
  workflow_dispatch:

jobs:
  scrape-lider:
    name: Scrape Líder
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Cache Playwright browser profile
        uses: actions/cache@v4
        with:
          path: backend/data/lider_browser_profile
          key: lider-pw-profile-v1

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y xvfb

      - name: Install Python dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        working-directory: backend
        run: playwright install chromium --with-deps

      - name: Scrape Líder
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          API_KEY: ${{ secrets.API_KEY }}
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
          ENVIRONMENT: production
          DISCORD_WEBHOOK_URL: ""
          DISCORD_BOT_TOKEN: ""
          GROQ_API_KEY: ""
          HUGGINGFACE_TOKEN: ""
          LIDER_PW_HEADLESS: "0"
          DISPLAY: ":99"
        run: |
          Xvfb :99 -screen 0 1280x720x24 -ac &
          sleep 2

          for query in leche arroz aceite pan pollo carne fideos azucar sal cafe; do
            echo "=== Scrapeando: $query ==="
            python domain/ingest.py --search "$query" --stores lider --pages 2 || true
          done

      - name: Report result
        if: always()
        run: echo "Scraper de Líder finalizado — revisar logs arriba para errores por PerimeterX"
