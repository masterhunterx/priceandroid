version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: grocery_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: grocery
      POSTGRES_USER: grocery_user
      POSTGRES_PASSWORD: grocery_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U grocery_user -d grocery"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
